  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #f8fafc; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    }
    button { font-family: inherit; }

    /* 헤더 */
    #header {
      background: #00843D;
      padding: 16px 20px 18px;
      position: sticky; top: 0; z-index: 100;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    #header .title { color: #fff; font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
    #header .sub   { color: #86efac; font-size: 12px; margin-top: 2px; }

    /* 컨텐츠 */
    #app { max-width: 600px; margin: 0 auto; padding: 0 14px; }

    /* 칼로리 카드 */
    #cal-card {
      background: #fff; border-radius: 16px; padding: 18px;
      margin: 16px 0 20px; box-shadow: 0 2px 12px rgba(0,0,0,.07);
      border: 1px solid #f0f0f0;
    }
    #cal-card .row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
    #cal-card .label { font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
    #cal-num  { font-size: 44px; font-weight: 800; line-height: 1; transition: color .3s; }
    #cal-unit { font-size: 15px; color: #6b7280; font-weight: 500; }
    #cal-badge {
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      transition: background .3s, color .3s;
    }
    #cal-bar-wrap { background: #f3f4f6; border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 12px; }
    #cal-bar { height: 100%; border-radius: 8px; width: 0%; transition: width .4s ease, background .4s; }
    #cal-breakdown { display: flex; flex-wrap: wrap; gap: 5px; }
    #cal-breakdown span {
      font-size: 11px; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 3px 7px; color: #6b7280;
    }
    #cal-breakdown strong { color: #374151; }
    #cal-pct { margin-top: 8px; font-size: 11px; color: #d1d5db; text-align: right; }

    /* 섹션 */
    .section { margin-bottom: 26px; }
    .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .section-num {
      width: 26px; height: 26px; border-radius: 50%; background: #00843D;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .section-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }

    /* 탭 */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .tab {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280; cursor: pointer;
    }
    .tab.active { background: #00843D; color: #fff; border-color: #00843D; }

    /* 그리드 */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }

    /* 선택 카드 */
    .card {
      padding: 9px 10px; border-radius: 10px;
      border: 2px solid #e5e7eb; background: #fff;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 7px;
      transition: border-color .12s, background .12s;
      min-width: 0;
    }
    .card.selected { border-color: #00843D; background: #f0fdf4; }
    .card .emoji { font-size: 17px; flex-shrink: 0; }
    .card .name  { font-size: 12px; font-weight: 500; color: #374151; line-height: 1.3; }
    .card.selected .name { font-weight: 700; color: #00843D; }
    .card .kcal  { font-size: 10px; color: #9ca3af; margin-top: 1px; }
    .card.selected .kcal { color: #16a34a; }

    /* 토핑 칩 */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 11px; border-radius: 20px;
      border: 2px solid #e5e7eb; background: #f9fafb;
      cursor: pointer; font-size: 12px; color: #374151;
      transition: all .12s;
    }
    .chip.selected { border-color: #00843D; background: #f0fdf4; font-weight: 600; color: #00843D; }
    .chip .chip-cal { font-size: 10px; color: #9ca3af; }
    .chip.selected .chip-cal { color: #16a34a; }

    /* 리셋 */
    #reset {
      width: 100%; padding: 14px; background: #fff;
      border: 2px solid #e5e7eb; border-radius: 12px;
      font-size: 14px; font-weight: 600; color: #6b7280;
      cursor: pointer; margin-top: 4px; margin-bottom: 8px;
    }

    /* 홈 화면 추가 배너 */
    #pwa-banner {
      display: none;
      background: #fff; border: 1.5px solid #bbf7d0;
      border-radius: 14px; padding: 12px 14px;
      margin: 0 0 16px; align-items: center; gap: 10px;
    }
    #pwa-banner .icon { font-size: 26px; }
    #pwa-banner .text { flex: 1; }
    #pwa-banner .text strong { display: block; font-size: 13px; color: #065f46; }
    #pwa-banner .text span { font-size: 11px; color: #6b7280; }
    #pwa-banner button {
      background: #00843D; color: #fff; border: none;
      border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #pwa-close { background: none !important; color: #9ca3af !important; padding: 4px !important; font-size: 16px !important; }

    /* 영양성분 박스 */
    .nutr-box { flex:1; background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:8px 4px; text-align:center; }
    .nutr-val  { font-size:18px; font-weight:800; color:#1a1a1a; line-height:1.1; }
    .nutr-unit { font-size:11px; font-weight:500; color:#9ca3af; }
    .nutr-label{ font-size:10px; color:#6b7280; margin-top:2px; }
    #nutr-prot .nutr-val { color:#3b82f6; }
    #nutr-fat  .nutr-val { color:#f97316; }
    #nutr-carb .nutr-val { color:#8b5cf6; }
    #nutr-sodium .nutr-val { color:#ef4444; font-size:15px; }
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:24px">🥖</span>
    <div>
      <div class="title">써브웨이 칼로리 계산기</div>
      <div class="sub">나만의 샌드위치 칼로리를 확인하세요</div>
    </div>
  </div>
</div>

<div id="app">

  <!-- PWA 배너 -->
  <div id="pwa-banner">
    <div class="icon">📲</div>
    <div class="text">
      <strong>홈 화면에 추가하면 앱처럼 사용!</strong>
      <span id="pwa-desc">브라우저 메뉴 → 홈 화면에 추가</span>
    </div>
    <button onclick="document.getElementById('pwa-banner').style.display='none'" id="pwa-close">✕</button>
  </div>

  <!-- 칼로리 카드 -->
  <div id="cal-card">
    <div class="row">
      <div>
        <div class="label">총 칼로리</div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span id="cal-num">0</span>
          <span id="cal-unit">kcal</span>
        </div>
      </div>
      <div id="cal-badge">선택해주세요</div>
    </div>
    <div id="cal-bar-wrap"><div id="cal-bar"></div></div>
    <!-- 영양성분 3대 지표 -->
    <div id="nutr-row" style="display:flex;gap:8px;margin:10px 0 8px;">
      <div class="nutr-box" id="nutr-prot">
        <div class="nutr-val">0<span class="nutr-unit">g</span></div>
        <div class="nutr-label">단백질</div>
      </div>
      <div class="nutr-box" id="nutr-fat">
        <div class="nutr-val">0<span class="nutr-unit">g</span></div>
        <div class="nutr-label">지방</div>
      </div>
      <div class="nutr-box" id="nutr-carb">
        <div class="nutr-val">0<span class="nutr-unit">g</span></div>
        <div class="nutr-label">탄수화물</div>
      </div>
      <div class="nutr-box" id="nutr-sodium">
        <div class="nutr-val">0<span class="nutr-unit">mg</span></div>
        <div class="nutr-label">나트륨</div>
      </div>
    </div>
    <div id="cal-breakdown"></div>
    <div id="cal-pct"></div>
  </div>

  <!-- Step 1: 샌드위치 -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">1</div>
      <div class="section-title">샌드위치 종류</div>
    </div>
    <div class="tabs" id="sw-tabs"></div>
    <div class="grid2" id="sw-grid"></div>
  </div>

  <!-- Step 2: 빵 -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">2</div>
      <div class="section-title">빵 선택</div>
    </div>
    <div class="grid2" id="bread-grid"></div>
  </div>

  <!-- Step 3: 치즈 -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">3</div>
      <div class="section-title">치즈 선택</div>
    </div>
    <div class="grid3" id="cheese-grid"></div>
  </div>

  <!-- Step 4: 소스 -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">4</div>
      <div class="section-title">소스 선택</div>
    </div>
    <div class="grid3" id="sauce-grid"></div>
  </div>

  <!-- Step 5: 토핑 -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">5</div>
      <div class="section-title">추가 토핑 (중복 선택 가능)</div>
    </div>
    <div class="chips" id="topping-chips"></div>
  </div>

  <button id="reset">🔄 초기화</button>
</div>

<script>
// ── 데이터 ──────────────────────────────────────────────────────

const state = { sandwich:null, bread:null, cheese:null, sauces:new Set(), toppings:new Set(), swTab:"전체" };

// ── 칼로리 계산 ──────────────────────────────────────────────
function getColors(cal) {
  if (cal < 400) return { main:"#22c55e", bg:"#f0fdf4", text:"가벼운 식사" };
  if (cal < 600) return { main:"#f59e0b", bg:"#fffbeb", text:"적당한 식사" };
  if (cal < 800) return { main:"#f97316", bg:"#fff7ed", text:"든든한 식사" };
  return             { main:"#ef4444", bg:"#fef2f2", text:"고칼로리 식사" };
}

function sumNutr(items) {
  return items.reduce((a,i)=>({
    cal:    a.cal    + (i?.cal    ?? 0),
    prot:   a.prot   + (i?.prot   ?? 0),
    fat:    a.fat    + (i?.fat    ?? 0),
    carb:   a.carb   + (i?.carb   ?? 0),
    sodium: a.sodium + (i?.sodium ?? 0),
  }), { cal:0, prot:0, fat:0, carb:0, sodium:0 });
}

function updateCalorie() {
  const sw  = SANDWICHES.find(s => s.id === state.sandwich);
  const br  = BREADS.find(b => b.id === state.bread);
  const ch  = CHEESES.find(c => c.id === state.cheese);
  const sauceList = SAUCES.filter(s => state.sauces.has(s.id));
  const tops = TOPPINGS.filter(t => state.toppings.has(t.id));

  const all = [sw, br, ch, ...sauceList, ...tops].filter(Boolean);
  const tot = sumNutr(all);

  const parts = [
    { label:"샌드위치", cal: sw?.cal ?? 0 },
    { label:"빵",       cal: br?.cal ?? 0 },
    { label:"치즈",     cal: ch?.cal ?? 0 },
    { label:"소스",     cal: sauceList.reduce((a,s)=>a+s.cal,0) },
    { label:"토핑",     cal: tops.reduce((a,t)=>a+t.cal,0) },
  ];

  const { main, bg, text } = getColors(tot.cal);

  document.getElementById("cal-num").textContent = tot.cal;
  document.getElementById("cal-num").style.color = main;
  const badge = document.getElementById("cal-badge");
  badge.textContent = tot.cal > 0 ? text : "선택해주세요";
  badge.style.background = tot.cal > 0 ? bg : "#f3f4f6";
  badge.style.color = tot.cal > 0 ? main : "#9ca3af";
  document.getElementById("cal-bar").style.width = Math.min(tot.cal/1000*100,100)+"%";
  document.getElementById("cal-bar").style.background = main;

  // 영양성분 업데이트
  const r = n => Math.round(n*10)/10;
  document.querySelector("#nutr-prot  .nutr-val").innerHTML = r(tot.prot)  + '<span class="nutr-unit">g</span>';
  document.querySelector("#nutr-fat   .nutr-val").innerHTML = r(tot.fat)   + '<span class="nutr-unit">g</span>';
  document.querySelector("#nutr-carb  .nutr-val").innerHTML = r(tot.carb)  + '<span class="nutr-unit">g</span>';
  document.querySelector("#nutr-sodium .nutr-val").innerHTML = Math.round(tot.sodium) + '<span class="nutr-unit">mg</span>';

  // 나트륨 경고 색
  const sodiumEl = document.querySelector("#nutr-sodium .nutr-val");
  sodiumEl.style.color = tot.sodium > 1500 ? "#ef4444" : tot.sodium > 900 ? "#f97316" : "#6b7280";

  const bd = document.getElementById("cal-breakdown");
  bd.innerHTML = parts.filter(p=>p.cal>0).map(p=>
    `<span>${p.label} <strong>${p.cal}</strong></span>`
  ).join("");

  document.getElementById("cal-pct").textContent =
    tot.cal > 0 ? `일일권장 2,000kcal 기준 ${Math.round(tot.cal/2000*100)}% · 나트륨 2,000mg 기준 ${Math.round(tot.sodium/2000*100)}%` : "";
}

// ── 렌더 ──────────────────────────────────────────────────────
function renderCard(container, items, selected, onSelect, showEmoji=false) {
  container.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "card" + (item.id === selected ? " selected" : "");
    const calText = item.cal > 0 ? `+${item.cal}kcal` : item.cal === 0 && item.id !== "none" ? "0kcal" : "";
    btn.innerHTML = (showEmoji && item.emoji ? `<span class="emoji">${item.emoji}</span>` : "") +
      `<div><div class="name">${item.name}</div>${calText ? `<div class="kcal">${calText}</div>` : ""}</div>`;
    btn.onclick = () => { onSelect(item.id); };
    container.appendChild(btn);
  });
}

function renderSandwiches() {
  const filtered = state.swTab === "전체"
    ? SANDWICHES
    : SANDWICHES.filter(s => s.tag === state.swTab);
  renderCard(document.getElementById("sw-grid"), filtered, state.sandwich, id => {
    state.sandwich = id; renderSandwiches(); updateCalorie();
  }, true);
}

function renderTabs() {
  const tabs = ["전체","클래식","프레쉬&라이트","프리미엄"];
  const wrap = document.getElementById("sw-tabs");
  wrap.innerHTML = "";
  tabs.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tab" + (tag === state.swTab ? " active" : "");
    btn.textContent = tag;
    btn.onclick = () => { state.swTab = tag; renderTabs(); renderSandwiches(); };
    wrap.appendChild(btn);
  });
}

function renderSauces() {
  const grid = document.getElementById("sauce-grid");
  grid.innerHTML = "";
  SAUCES.forEach(item => {
    const btn = document.createElement("button");
    const sel = state.sauces.has(item.id);
    btn.className = "card" + (sel ? " selected" : "");
    const calText = item.cal > 0 ? `+${item.cal}kcal` : "";
    btn.innerHTML = `<div><div class="name">${item.name}</div>${calText ? `<div class="kcal">${calText}</div>` : ""}</div>`;
    btn.onclick = () => {
      if (item.id === "none") {
        state.sauces.clear();
        state.sauces.add("none");
      } else {
        state.sauces.delete("none");
        state.sauces.has(item.id) ? state.sauces.delete(item.id) : state.sauces.add(item.id);
      }
      renderSauces(); updateCalorie();
    };
    grid.appendChild(btn);
  });
}

function renderToppings() {
  const wrap = document.getElementById("topping-chips");
  wrap.innerHTML = "";
  TOPPINGS.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "chip" + (state.toppings.has(item.id) ? " selected" : "");
    btn.innerHTML = `<span>${item.emoji}</span><span>${item.name}</span><span class="chip-cal">+${item.cal}</span>`;
    btn.onclick = () => {
      state.toppings.has(item.id) ? state.toppings.delete(item.id) : state.toppings.add(item.id);
      renderToppings(); updateCalorie();
    };
    wrap.appendChild(btn);
  });
}

function init() {
  renderTabs();
  renderSandwiches();
  renderCard(document.getElementById("bread-grid"), BREADS, state.bread, id => {
    state.bread = id;
    renderCard(document.getElementById("bread-grid"), BREADS, state.bread, arguments.callee);
    updateCalorie();
  });
  renderCard(document.getElementById("cheese-grid"), CHEESES, state.cheese, id => {
    state.cheese = id;
    renderCard(document.getElementById("cheese-grid"), CHEESES, state.cheese, arguments.callee);
    updateCalorie();
  });
  renderSauces();
  renderToppings();
  updateCalorie();

  document.getElementById("reset").onclick = () => {
    state.sandwich = null; state.bread = null;
    state.cheese = null; state.sauces.clear(); state.toppings.clear();
    renderTabs(); renderSandwiches();
    renderCard(document.getElementById("bread-grid"), BREADS, null, ()=>{});
    renderCard(document.getElementById("cheese-grid"), CHEESES, null, ()=>{});
    renderSauces();
    renderToppings(); updateCalorie();
    init();
  };
}

// ── PWA 배너 ──────────────────────────────────────────────────
function showPWABanner() {
  const banner = document.getElementById("pwa-banner");
  const desc   = document.getElementById("pwa-desc");
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone;

  if (isStandalone) return; // 이미 앱으로 실행 중
  if (!isIOS && !isAndroid) return; // 데스크탑은 패스

  if (isIOS) {
    desc.textContent = "Safari → 공유 버튼(□↑) → '홈 화면에 추가'";
  } else {
    desc.textContent = "브라우저 메뉴(⋮) → '홈 화면에 추가'";
  }
  banner.style.display = "flex";
}
